name: Collecte téléchargements APK

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-downloads
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collecte téléchargements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/collect_downloads.py

      - name: Commit si changement
        run: |
          git add stats/downloads.json history/downloads-*.json
          if git diff --cached --quiet; then
            echo "aucun changement"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "data: téléchargements APK du $(date -u +'%F %H:%M') UTC"
            git pull --rebase origin main
            git push
          fi
