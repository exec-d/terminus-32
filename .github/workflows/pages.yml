# Build SvelteKit (web/) puis déploiement sur GitHub Pages.
# Prérequis (fait) : Settings → Pages → Source = GitHub Actions.
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # `path` est résolu depuis la racine du dépôt (pas depuis working-directory).
      - name: Upload du build SvelteKit
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/build

      - name: Déploiement Pages
        id: deployment
        uses: actions/deploy-pages@v5
