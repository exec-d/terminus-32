name: Collecte ponctualité ligne 32

# Le flux GTFS-RT retient la journée de service en cours. Échantillonnage
# toutes les 4 h (00/04/08/12/16/20 UTC) : couvre chaque train pendant qu'il est
# vivant dans le flux — notamment ceux du petit matin, que l'ancien rythme
# (14h/23h45/5h30 Paris) manquait. Les crons sont best-effort côté GitHub ; la
# fusion par date de service rend les runs idempotents (pas de double comptage),
# un passage raté est rattrapé par le suivant.
on:
  schedule:
    - cron: '0 */4 * * *'  # toutes les 4 h (UTC) ; Paris été 02/06/10/14/18/22
  workflow_dispatch:

# Moindre privilège : contents pour committer history/ et stats/.
permissions:
  contents: write

# Deux runs simultanés pousseraient des commits concurrents.
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Dépendances
        run: pip install -r tools/requirements.txt

      - name: Collecte + stats
        run: python tools/collect.py

      - name: Commit si changement
        run: |
          git add history stats
          if git diff --cached --quiet; then
            echo "aucun changement"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "data: ponctualité du $(date -u +'%F %H:%M') UTC"
            git pull --rebase origin main
            git push
          fi
